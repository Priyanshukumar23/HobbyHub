version: '3.8'

services:

  server:
    build:
      context: ./server
      dockerfile: Dockerfile

    container_name: hobbyhub_server

    ports:
      - "5000:5000"

    env_file:
      - ./server/.env

    restart: unless-stopped


  client:
    build:
      context: ./client
      dockerfile: Dockerfile

    container_name: hobbyhub_client

    ports:
      - "80:80"

    depends_on:
      - server

    restart: unless-stopped
